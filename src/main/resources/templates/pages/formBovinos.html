<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Registrar Bovino</title>
    <!-- favicon -->
    <link rel="icon" th:href="@{images/vaca.png}">
    <!-- Tus estilos existentes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/formBovino.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <!-- Estilos adicionales para el campo de fecha -->
    <style>
        /* Estilo específico para el input de fecha */
        input[type="date"].form-input {
            color: #4b5563;
            font-family: 'Inter', monospace;
        }

        input[type="date"].form-input::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
            opacity: 0;
        }

        .date-wrapper {
            position: relative;
        }

        .date-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            pointer-events: none;
        }

        /* Tooltip para formato de fecha */
        .date-helper {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .date-helper i {
            color: #10b981;
            font-size: 0.875rem;
        }
    </style>
</head>
<body class="bg-gray-50">
<!-- Navbar fragment -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Contenido principal -->
<main class="max-w-3xl mx-auto px-4 py-8">
    <!-- Título -->
    <div class="mb-8 text-center md:text-left">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800">
            <i class="fas fa-pen-alt text-green-600 mr-3"></i>
            <span th:text="${titulo}">Registrar Nuevo Bovino</span>
        </h1>
        <p class="text-gray-600 mt-2">Completa los datos del bovino para registrarlo en el sistema</p>
    </div>

    <!-- Mensajes de alerta -->
    <div th:if="${mensaje}"
         th:class="${tipoMensaje == 'exito' ? 'bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4' : 'bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4'}">
        <span th:text="${mensaje}"></span>
    </div>

    <!-- Formulario -->
    <div class="form-container">
        <form th:action="@{/bovinos/guardar}" th:object="${bovino}" method="post" class="bovino-form" id="bovinoForm">

            <!-- CAMBIO IMPORTANTE: idBovino en lugar de id -->
            <input type="hidden" th:field="*{id}" />

            <!-- Campo: Código de Arete -->
            <div class="form-group">
                <label for="codigoArete" class="form-label">
                    <i class="fas fa-tag mr-2 text-green-600"></i>
                    Código de Arete
                </label>
                <input type="text"
                       id="codigoArete"
                       th:field="*{codigoArete}"
                       class="form-input"
                       placeholder="Ej: BOV-001, HOL-001"
                       required>
                <div class="form-error" id="errorCodigoArete" th:if="${#fields.hasErrors('codigoArete')}" th:errors="*{codigoArete}"></div>
            </div>

            <!-- Campo: Nombre del Bovino -->
            <div class="form-group">
                <label for="nombreBovino" class="form-label">
                    <i class="fas fa-cow mr-2 text-green-600"></i>
                    Nombre del Bovino
                </label>
                <input type="text"
                       id="nombreBovino"
                       th:field="*{nombreBovino}"
                       class="form-input"
                       placeholder="Ej: Lola, Manchas, Torito"
                       required>
                <div class="form-error" id="errorNombre" th:if="${#fields.hasErrors('nombreBovino')}" th:errors="*{nombreBovino}"></div>
            </div>

            <!-- Campo: Sexo -->
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-venus-mars mr-2 text-green-600"></i>
                    Sexo
                </label>
                <div class="sexo-options">
                    <label class="sexo-option">
                        <input type="radio" name="sexo" th:field="*{sexo}" value="Macho" class="hidden" required>
                        <div class="sexo-card macho" th:classappend="${bovino.sexo == 'Macho'} ? 'selected' : ''">
                            <i class="fas fa-mars text-3xl mb-2"></i>
                            <span class="text-lg font-medium">Macho</span>
                        </div>
                    </label>
                    <label class="sexo-option">
                        <input type="radio" name="sexo" th:field="*{sexo}" value="Hembra" class="hidden" required>
                        <div class="sexo-card hembra" th:classappend="${bovino.sexo == 'Hembra'} ? 'selected' : ''">
                            <i class="fas fa-venus text-3xl mb-2"></i>
                            <span class="text-lg font-medium">Hembra</span>
                        </div>
                    </label>
                </div>
                <div class="form-error" id="errorSexo" th:if="${#fields.hasErrors('sexo')}" th:errors="*{sexo}"></div>
            </div>

            <!-- Campo: Peso -->
            <div class="form-group">
                <label for="peso" class="form-label">
                    <i class="fas fa-weight-scale mr-2 text-green-600"></i>
                    Peso (kg)
                </label>
                <input type="number"
                       id="peso"
                       th:field="*{peso}"
                       step="0.01"
                       min="0"
                       max="2000"
                       class="form-input"
                       placeholder="0.00"
                       required>
                <div class="form-error" id="errorPeso" th:if="${#fields.hasErrors('peso')}" th:errors="*{peso}"></div>
            </div>

            <!-- Campo: Fecha de Nacimiento - CORREGIDO -->
            <div class="form-group">
                <label for="fechaNacimiento" class="form-label">
                    <i class="fas fa-calendar-alt mr-2 text-green-600"></i>
                    Fecha de Nacimiento
                </label>
                <div class="relative date-wrapper">
                    <input type="date"
                           id="fechaNacimiento"
                           name="fechaNacimiento"
                           th:value="${bovino.fechaNacimiento != null ? #temporals.format(bovino.fechaNacimiento, 'yyyy-MM-dd') : ''}"
                           class="form-input"
                           required>
                    <i class="fas fa-calendar-day date-icon"></i>
                </div>
                <div class="date-helper">
                    <i class="fas fa-info-circle"></i>
                    <span>Formato: YYYY-MM-DD (Ej: 2021-03-10)</span>
                </div>
                <div class="form-error" id="errorFechaNacimiento" th:if="${#fields.hasErrors('fechaNacimiento')}" th:errors="*{fechaNacimiento}"></div>
            </div>

            <!-- Campo: Estado de Salud -->
            <div class="form-group">
                <label for="estadoSalud" class="form-label">
                    <i class="fas fa-heartbeat mr-2 text-green-600"></i>
                    Estado de Salud
                </label>
                <select id="estadoSalud" th:field="*{estadoSalud}" class="form-input" required>
                    <option value="" disabled selected>Selecciona un estado</option>
                    <option value="Saludable">Saludable</option>
                    <option value="En tratamiento">En tratamiento</option>
                    <option value="Observación">Observación</option>
                    <option value="Crítico">Crítico</option>
                </select>
                <div class="form-error" id="errorEstadoSalud" th:if="${#fields.hasErrors('estadoSalud')}" th:errors="*{estadoSalud}"></div>
            </div>

            <!-- === NUEVOS CAMPOS: Selectores desde BD === -->

            <!-- Campo: Raza (select desde BD) -->
            <div class="form-group">
                <label for="raza" class="form-label">
                    <i class="fas fa-paw mr-2 text-green-600"></i>
                    Raza
                </label>
                <select id="raza" th:field="*{raza.idRaza}" class="form-input">
                    <option value="">Selecciona una raza</option>
                    <option th:each="raza : ${razas}"
                            th:value="${raza.idRaza}"
                            th:text="${raza.nombre}"></option>
                </select>
            </div>

            <!-- Campo: Potrero (select desde BD) -->
            <div class="form-group">
                <label for="potrero" class="form-label">
                    <i class="fas fa-tree mr-2 text-green-600"></i>
                    Potrero
                </label>
                <select id="potrero" th:field="*{potrero.idPotrero}" class="form-input">
                    <option value="">Selecciona un potrero</option>
                    <option th:each="potrero : ${potreros}"
                            th:value="${potrero.idPotrero}"
                            th:text="${potrero.nombrePotrero}"></option>
                </select>
            </div>

            <!-- Campo: Empleado (select desde BD) -->
            <div class="form-group">
                <label for="empleado" class="form-label">
                    <i class="fas fa-user mr-2 text-green-600"></i>
                    Empleado Responsable
                </label>
                <select id="empleado" th:field="*{empleado.idEmpleado}" class="form-input">
                    <option value="">Selecciona un empleado</option>
                    <option th:each="empleado : ${empleados}"
                            th:value="${empleado.idEmpleado}"
                            th:text="${empleado.nombre + ' ' + empleado.apellido}"></option>
                </select>
            </div>

            <!-- === FIN DE NUEVOS CAMPOS === -->

            <!-- Botones de acción -->
            <div class="form-actions">
                <button type="submit" class="btn btn-guardar" id="btnGuardar">
                    <i class="fas fa-save mr-2"></i>
                    <span th:text="${bovino.id != null} ? 'Actualizar Bovino' : 'Guardar Bovino'">Guardar Bovino</span>
                </button>

                <a href="/bovinos" class="btn btn-cancelar">
                    <i class="fas fa-times mr-2"></i>
                    Cancelar
                </a>
            </div>

            <!-- Mensaje de confirmación -->
            <div id="mensajeConfirmacion" class="hidden"></div>
        </form>
    </div>
</main>

<!-- Footer fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script th:src="@{/js/formBovino.js}"></script>
<div th:replace="~{fragments/navbar :: navbar-scripts}"></div>
<div th:replace="~{fragments/footer :: footer-scripts}"></div>

<!-- Script para selección visual de sexo -->
<script>
    $(document).ready(function() {
        $('input[name="sexo"]').change(function() {
            $('.sexo-card').removeClass('selected border-4 border-green-500');
            $(this).siblings('.sexo-card').addClass('selected border-4 border-green-500');
        });

        // Marcar el sexo seleccionado al cargar la página (para edición)
        var selectedSexo = $('input[name="sexo"]:checked').val();
        if (selectedSexo) {
            $('input[name="sexo"]:checked').siblings('.sexo-card').addClass('selected border-4 border-green-500');
        }
    });
</script>

        console.log("Empleados disponibles:", /*[[${empleados}]]*/ null ? /*[[${empleados.size()}]]*/ 0 : 0);
        console.log("====================================");
    });
</script>
</body>
</html>
