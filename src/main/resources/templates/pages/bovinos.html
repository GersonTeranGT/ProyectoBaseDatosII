<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Gestión de Bovinos</title>
    <!-- favicon -->
    <link rel="icon" th:href="@{images/vaca.png}">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- CSS Personalizados -->
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/bovinos.css}">
</head>
<body>
<!-- Navbar fragment -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Contenido principal -->
<main class="max-w-7xl mx-auto px-4 py-8">

    <!-- Barra superior -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-4 md:mb-0">
            <i class="fas fa-cow text-green-600 mr-3"></i>
            <span th:text="${titulo}">Gestión de Bovinos</span>
        </h1>

        <a th:href="@{/bovinos/nuevo}" class="btn-nuevo">
            <i class="fas fa-plus-circle mr-2"></i>
            Registrar Bovino
        </a>
    </div>

    <!-- Barra de búsqueda -->
    <div class="bg-white p-4 rounded-lg shadow-md mb-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Buscar por nombre o arete..."
                       class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>

            <select id="sexoFilter"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                <option value="">Todos los sexos</option>
                <option value="Macho">Macho</option>
                <option value="Hembra">Hembra</option>
            </select>

            <select id="saludFilter"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500">
                <option value="">Todos los estados</option>
                <option value="Saludable">Saludable</option>
                <option value="En tratamiento">En tratamiento</option>
                <option value="En observación">En observación</option>
                <option value="Crítico">Crítico</option>
            </select>

            <button id="clearFilters"
                    class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition-colors">
                <i class="fas fa-eraser mr-2"></i>
                Limpiar filtros
            </button>
        </div>
    </div>

    <!-- Tabla de bovinos -->
    <div class="bg-white rounded-lg shadow-xl overflow-hidden">
        <table class="bovinos-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Código Arete</th>
                <th>Nombre</th>
                <th>Sexo</th>
                <th>Peso (kg)</th>
                <th>Estado Salud</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="bovinosTableBody">
            <!-- Las filas se cargarán vía AJAX -->
            </tbody>
        </table>

        <!-- Resumen -->
        <div class="border-t border-gray-200 p-4 flex justify-between items-center text-gray-600">
            <span id="totalRegistros">Cargando...</span>
        </div>
    </div>

    <!-- Tarjetas de estadísticas -->
    <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mt-8">
        <div class="stat-card">
            <div class="stat-icon bg-blue-100 text-blue-600">
                <i class="fas fa-list fa-2x"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">Total</span>
                <span class="stat-value" id="totalBovinos">0</span>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon bg-green-100 text-green-600">
                <i class="fas fa-mars fa-2x"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">Machos</span>
                <span class="stat-value" id="totalMachos">0</span>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon bg-pink-100 text-pink-600">
                <i class="fas fa-venus fa-2x"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">Hembras</span>
                <span class="stat-value" id="totalHembras">0</span>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon bg-yellow-100 text-yellow-600">
                <i class="fas fa-heartbeat fa-2x"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">Saludables</span>
                <span class="stat-value" id="totalSaludables">0</span>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon bg-purple-100 text-purple-600">
                <i class="fas fa-weight-scale fa-2x"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">Peso Prom.</span>
                <span class="stat-value" id="pesoPromedio">0 kg</span>
            </div>
        </div>
    </div>
</main>

<!-- Footer fragment -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script th:src="@{/js/bovinos.js}"></script>

<!-- Scripts de los fragments -->
<div th:replace="~{fragments/navbar :: navbar-scripts}"></div>
<div th:replace="~{fragments/footer :: footer-scripts}"></div>

<!-- Script para pasar variable de página actual -->
<script th:inline="javascript">
    /*<![CDATA[*/
    const currentPage = /*[[${currentPage}]]*/ 'bovinos';
    /*]]>*/
</script>
</body>
</html>
